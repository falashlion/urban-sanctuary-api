run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosec
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - prealloc

linters-settings:
  govet:
    check-shadowing: true
  gosec:
    excludes:
      - G104  # Audit errors not checked (we handle them explicitly)
  goimports:
    local-prefixes: github.com/falashlion/urban-sanctuary-api

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: cmd/server/main\.go
      linters:
        - noctx
