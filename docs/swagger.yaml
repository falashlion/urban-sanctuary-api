openapi: 3.0.3
info:
  title: Urban Sanctuary API
  description: |
    Premium Apartment Booking Platform — Douala, Cameroon.

    The Urban Sanctuary API powers a modern apartment booking system with:
    - Multi-method authentication (Email/Password, Phone/OTP, 2FA)
    - Property listing management with image uploads
    - Booking engine with conflict prevention & loyalty points
    - Payment integration (MTN Mobile Money & Orange Money)
    - Role-based access control (Guest, Homeowner, Admin)
    - Review & rating system (verified stays only)
    - Full admin console with audit trail

    ## Authentication
    All authenticated endpoints require a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
    Access tokens are obtained via `/auth/login` or `/auth/register` and are valid for **15 minutes**.
    Refresh tokens are stored as HttpOnly cookies and are valid for **7 days**.

    ## Response Envelope
    All responses follow a standard JSON envelope:
    ```json
    {
      "success": true,
      "status": 200,
      "message": "...",
      "data": { ... },
      "meta": { "page": 1, "per_page": 20, "total": 100, "total_pages": 5 },
      "request_id": "uuid"
    }
    ```

    ## Rate Limiting
    - Global: 100 requests/minute per IP
    - Auth endpoints: 5 requests/minute per IP
    - Rate limit headers: `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`
  version: 1.0.0
  contact:
    name: Urban Sanctuary Team
    email: support@urbansanctuary.cm
  license:
    name: MIT

servers:
  - url: http://sanaps.mooo.com/api/v1
    description: Production

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Authentication & authorization
  - name: Users
    description: User profile management
  - name: Properties
    description: Property listing management
  - name: Bookings
    description: Booking engine & checkout
  - name: Payments
    description: Payment processing (MTN MoMo, Orange Money)
  - name: Webhooks
    description: Payment provider callbacks
  - name: Admin
    description: Admin console operations

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns the health status of the API and its dependencies (PostgreSQL, Redis).
      operationId: healthCheck
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more services degraded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthResponse"

  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account. At least one of `email` or `phone` must be provided.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Authenticates a user with email/phone and password.
        Returns an access token in the response body and a refresh token as an HttpOnly cookie.

        **Account lockout:** After 5 failed attempts, the account is locked for 15 minutes.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
                example: "refresh_token=abc123; Path=/api/v1/auth; HttpOnly; Max-Age=604800"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Rotates the refresh token and issues a new access token.
        The refresh token can be sent via HttpOnly cookie (preferred) or in the request body.
      operationId: refreshToken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: Only needed if not using HttpOnly cookie
      responses:
        "200":
          description: Token refreshed
          headers:
            Set-Cookie:
              description: New HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the refresh token and clears the cookie.
      operationId: logout
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"

  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP
      description: |
        Sends a 6-digit OTP code via SMS or email.
        Codes expire after **5 minutes** and allow a maximum of **3 verification attempts**.
      operationId: requestOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OTPRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP
      description: Validates a 6-digit OTP code.
      operationId: verifyOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OTPVerifyRequest"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/2fa/enable:
    post:
      tags: [Auth]
      summary: Enable 2FA
      description: Initiates TOTP 2FA setup. Returns a secret and QR code URL.
      operationId: enable2FA
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 2FA setup initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Enable2FAResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/confirm:
    post:
      tags: [Auth]
      summary: Confirm 2FA
      description: Confirms TOTP 2FA activation with a 6-digit code from the authenticator app.
      operationId: confirm2FA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPCodeRequest"
      responses:
        "200":
          description: 2FA activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify 2FA
      description: Validates a TOTP 2FA code during login.
      operationId: verify2FA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPCodeRequest"
      responses:
        "200":
          description: 2FA verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/password/reset-request:
    post:
      tags: [Auth]
      summary: Request password reset
      description: Sends a password reset OTP to the user's email or phone.
      operationId: passwordResetRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Reset instructions sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"

  /auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password
      description: Sets a new password using the reset token.
      operationId: passwordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirm"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ──────────────────────────────────────────────
  # Users
  # ──────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Users]
      summary: Update current user profile
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /users/me/password:
    patch:
      tags: [Users]
      summary: Change password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /users/me/bookings:
    get:
      tags: [Users]
      summary: Get current user's bookings
      operationId: getUserBookings
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, completed]
      responses:
        "200":
          description: Bookings retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BookingResponse"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/loyalty:
    get:
      tags: [Users]
      summary: Get loyalty points balance
      description: |
        Returns the user's loyalty points balance and XAF equivalent.
        Each loyalty point = 10 XAF.
      operationId: getLoyalty
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Loyalty info retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoyaltyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/notifications:
    get:
      tags: [Users]
      summary: Get notifications
      operationId: getNotifications
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Notifications retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/NotificationResponse"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # Properties
  # ──────────────────────────────────────────────
  /properties:
    get:
      tags: [Properties]
      summary: List properties
      description: |
        Returns published properties with support for filtering, searching, sorting, and pagination.
        Only properties with status `published` are returned to unauthenticated users.
      operationId: listProperties
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: neighborhood
          in: query
          schema:
            type: string
            enum: [akwa, bonapriso, bonanjo, kotto, other]
        - name: min_price
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: max_price
          in: query
          schema:
            type: number
            format: double
            minimum: 0
        - name: bedrooms
          in: query
          schema:
            type: integer
            minimum: 1
        - name: max_guests
          in: query
          schema:
            type: integer
            minimum: 1
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, price_per_night]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          description: Full-text search on title and description
          schema:
            type: string
      responses:
        "200":
          description: Properties retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PropertyResponse"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
    post:
      tags: [Properties]
      summary: Create a property
      description: Creates a new property listing in `draft` status. Requires `homeowner` or `admin` role.
      operationId: createProperty
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyRequest"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PropertyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /properties/{id}:
    get:
      tags: [Properties]
      summary: Get property details
      operationId: getProperty
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Property retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PropertyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Properties]
      summary: Update property
      description: Updates property details. Only the owner or an admin can update.
      operationId: updateProperty
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyRequest"
      responses:
        "200":
          description: Property updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PropertyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /properties/{id}/availability:
    get:
      tags: [Properties]
      summary: Get availability
      description: Returns booked (unavailable) date ranges for a property.
      operationId: getPropertyAvailability
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Availability retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DateRange"
        "404":
          $ref: "#/components/responses/NotFound"

  /properties/{id}/images:
    post:
      tags: [Properties]
      summary: Upload property image
      description: Uploads an image to a property. Accepts multipart form data. Max 10MB per image.
      operationId: uploadPropertyImage
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, WebP)
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PropertyImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /properties/{id}/images/{imageId}:
    delete:
      tags: [Properties]
      summary: Delete property image
      operationId: deletePropertyImage
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /properties/{id}/status:
    patch:
      tags: [Properties]
      summary: Update property status
      description: |
        Changes the property publication status. Admin only.
        Valid transitions: `draft` → `published` → `archived`
      operationId: updatePropertyStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, published, archived]
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Bookings
  # ──────────────────────────────────────────────
  /bookings:
    post:
      tags: [Bookings]
      summary: Create a booking
      description: |
        Creates a new booking (step 1 of the 3-step checkout flow).
        Validates:
        - Property exists and is published
        - Guest count ≤ max_guests
        - No date conflicts with existing bookings
        - Loyalty points balance (if redeeming)

        **Pricing:** `total = (nights × price_per_night) - loyalty_discount`
        **Loyalty:** Each point = 10 XAF discount
      operationId: createBooking
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BookingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Booking conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking details
      description: Returns booking details. Accessible by the guest, property owner, or admin.
      operationId: getBooking
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Booking retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BookingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /bookings/{id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel a booking
      description: |
        Cancels a pending or confirmed booking. Only the guest can cancel.
        If loyalty points were used, they are refunded to the user's balance.
      operationId: cancelBooking
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Booking status does not allow cancellation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /bookings/{id}/review:
    post:
      tags: [Bookings]
      summary: Submit a review
      description: |
        Submits a review for a completed booking. Only the guest can review.
        Reviews are automatically marked as verified since they are linked to a real stay.
        Only one review per booking is allowed.
      operationId: submitReview
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────
  # Payments
  # ──────────────────────────────────────────────
  /payments/initiate:
    post:
      tags: [Payments]
      summary: Initiate a payment
      description: |
        Starts a payment process for a pending booking (step 2 of the checkout flow).
        Sends a payment request to the selected provider (MTN MoMo or Orange Money).
        The user will receive a prompt on their phone to confirm the payment.
      operationId: initiatePayment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "201":
          description: Payment initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Payment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Booking not in pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /payments/{id}/status:
    get:
      tags: [Payments]
      summary: Get payment status
      description: Polls the current status of a payment.
      operationId: getPaymentStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Payment status retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Webhooks
  # ──────────────────────────────────────────────
  /webhooks/mtn:
    post:
      tags: [Webhooks]
      summary: MTN MoMo payment callback
      description: |
        Receives payment status updates from MTN MoMo.
        Validates the `X-Callback-Signature` header.
        On successful payment: booking status → `confirmed`, 100 loyalty points awarded.
      operationId: mtnWebhook
      parameters:
        - name: X-Callback-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: processed

  /webhooks/orange:
    post:
      tags: [Webhooks]
      summary: Orange Money payment callback
      description: |
        Receives payment status updates from Orange Money.
        Validates the `X-Callback-Signature` header.
      operationId: orangeWebhook
      parameters:
        - name: X-Callback-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: processed

