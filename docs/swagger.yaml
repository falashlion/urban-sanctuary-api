# ════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from `/auth/login` or `/auth/register`

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    # ── Envelopes ──────────────────────────
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Operation successful
        data:
          type: object
          nullable: true
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        request_id:
          type: string
          format: uuid
      required: [success, status, message, request_id]

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        status:
          type: integer
          example: 400
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: One or more fields are invalid
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: must be a valid email address
        request_id:
          type: string
          format: uuid

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          format: int64
          example: 150
        total_pages:
          type: integer
          example: 8

    # ── Auth ───────────────────────────────
    RegisterRequest:
      type: object
      required: [password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        phone:
          type: string
          description: E.164 format
          example: "+237670000000"
        password:
          type: string
          minLength: 8
          maxLength: 128
          example: SecureP@ss123
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          example: John
        last_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Doe

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        phone:
          type: string
          example: "+237670000000"
        password:
          type: string
          example: SecureP@ss123

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIs...
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token TTL in seconds
          example: 900
        user:
          $ref: "#/components/schemas/UserResponse"

    OTPRequest:
      type: object
      required: [identifier, purpose]
      properties:
        identifier:
          type: string
          description: Email address or phone number
          example: "+237670000000"
        purpose:
          type: string
          enum: [login, registration, password_reset, verification]

    OTPVerifyRequest:
      type: object
      required: [identifier, code, purpose]
      properties:
        identifier:
          type: string
          example: "+237670000000"
        code:
          type: string
          minLength: 6
          maxLength: 6
          example: "482910"
        purpose:
          type: string
          enum: [login, registration, password_reset, verification]

    Enable2FAResponse:
      type: object
      properties:
        secret:
          type: string
          example: JBSWY3DPEHPK3PXP
        qr_code_url:
          type: string
          example: "otpauth://totp/UrbanSanctuary:john@example.com?secret=JBSWY3DPEHPK3PXP&issuer=UrbanSanctuary"

    TOTPCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"

    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string

    PasswordResetConfirm:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 128

    # ── Users ──────────────────────────────
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        avatar_url:
          type: string
          format: uri
          nullable: true
        role:
          type: string
          enum: [guest, homeowner, admin]
        is_verified:
          type: boolean
        totp_enabled:
          type: boolean
        loyalty_points:
          type: integer
          example: 500
        created_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        avatar_url:
          type: string
          format: uri

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 128
        totp_code:
          type: string
          description: Required if 2FA is enabled
          minLength: 6
          maxLength: 6

    LoyaltyResponse:
      type: object
      properties:
        balance:
          type: integer
          example: 500
        points_value_xaf:
          type: number
          format: double
          description: XAF equivalent (1 point = 10 XAF)
          example: 5000.0
        history:
          type: array
          items:
            type: object
            properties:
              booking_id:
                type: string
                format: uuid
              type:
                type: string
                enum: [earned, redeemed]
              points:
                type: integer
              date:
                type: string
                format: date-time

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          example: booking_confirmed
        channel:
          type: string
          enum: [email, sms, push]
        title:
          type: string
        content:
          type: string
        sent_at:
          type: string
          format: date-time
          nullable: true
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Properties ─────────────────────────
    CreatePropertyRequest:
      type: object
      required: [title, description, neighborhood, address, price_per_night, bedrooms, bathrooms, max_guests]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Luxury Studio in Bonapriso
        description:
          type: string
          minLength: 10
          example: A beautifully furnished studio apartment in the heart of Bonapriso with modern amenities.
        neighborhood:
          type: string
