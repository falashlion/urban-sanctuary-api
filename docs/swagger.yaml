          format: date
          example: "2025-06-15"
        check_out:
          type: string
          format: date
          example: "2025-06-20"

    # ── Bookings ───────────────────────────
    CreateBookingRequest:
      type: object
      required: [property_id, check_in, check_out, guests_count]
      properties:
        property_id:
          type: string
          format: uuid
        check_in:
          type: string
          format: date
          description: "Format: YYYY-MM-DD"
          example: "2025-06-15"
        check_out:
          type: string
          format: date
          description: "Format: YYYY-MM-DD"
          example: "2025-06-20"
        guests_count:
          type: integer
          minimum: 1
          example: 2
        use_loyalty_points:
          type: integer
          minimum: 0
          description: Number of loyalty points to redeem (1 point = 10 XAF discount)
          example: 0

    BookingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        guest_id:
          type: string
          format: uuid
        check_in:
          type: string
          format: date
        check_out:
          type: string
          format: date
        nights:
          type: integer
          example: 5
        guests_count:
          type: integer
          example: 2
        base_amount:
          type: number
          format: double
          description: nights × price_per_night
          example: 125000
        discount_amount:
          type: number
          format: double
          description: Loyalty points discount in XAF
          example: 0
        total_amount:
          type: number
          format: double
          description: base_amount - discount_amount
          example: 125000
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        loyalty_points_earned:
          type: integer
          description: Points awarded on completion (100 per booking)
          example: 100
        loyalty_points_used:
          type: integer
          description: Points redeemed for discount
          example: 0
        property:
          $ref: "#/components/schemas/PropertyResponse"
        guest:
          $ref: "#/components/schemas/UserResponse"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          maxLength: 2000
          example: Amazing apartment, great location!

    ReviewResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        guest_id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        is_verified:
          type: boolean
          description: Always true (linked to a real stay)
        guest:
          $ref: "#/components/schemas/UserResponse"
        created_at:
          type: string
          format: date-time

    # ── Payments ───────────────────────────
    InitiatePaymentRequest:
      type: object
      required: [booking_id, provider, phone_number]
      properties:
        booking_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [mtn_momo, orange_money]
          description: Payment provider
          example: mtn_momo
        phone_number:
          type: string
          description: Phone number linked to the mobile money account
          example: "+237670000000"

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [mtn_momo, orange_money]
        provider_reference:
          type: string
          nullable: true
          description: External transaction ID from the payment provider
        phone_number:
          type: string
        amount:
          type: number
          format: double
          example: 125000
        currency:
          type: string
          example: XAF
        status:
          type: string
          enum: [initiated, pending, completed, failed, refunded]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookPayload:
      type: object
      description: Raw webhook payload from payment provider (structure varies)
      properties:
        externalId:
          type: string
          description: Our payment ID
        status:
          type: string
          description: "SUCCESSFUL, FAILED, or PENDING"
        financialTransactionId:
          type: string
          description: Provider's transaction reference

