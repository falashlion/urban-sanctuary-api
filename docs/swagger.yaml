          format: double
          example: 4.0483
        longitude:
          type: number
          format: double
          example: 9.6959
        price_per_night:
          type: number
          format: double
          minimum: 0
          example: 25000
        bedrooms:
          type: integer
          minimum: 1
          example: 1
        bathrooms:
          type: integer
          minimum: 1
          example: 1
        max_guests:
          type: integer
          minimum: 1
          example: 2
        amenities:
          type: array
          items:
            type: string
          example: [wifi, air_conditioning, parking, pool]

